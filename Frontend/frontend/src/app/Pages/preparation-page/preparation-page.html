<div class="file-uploads">
  <app-file-upload (outputFile)="templateReceived($event)" [file_type]="'шаблон'"></app-file-upload>
  <app-file-upload (outputFile)="dataReceived($event)" [file_type]="'таблицу'"></app-file-upload>
</div>
@for (config of configs; track $index) {
  <app-placeholder [config]="config"></app-placeholder>
}

<div class="info">
  <app-data-information [variables]="variables" [headers]="headers"></app-data-information>
  <app-preview [total] = "total" [previews]="previews"></app-preview>
</div>

<pre>{{result }}</pre>
