@if (loading) {
  <mat-spinner [diameter]="40"></mat-spinner>
} @else {
  <mat-card>
    <mat-card-content>
      <mat-form-field appearance="outline" style="width: 100%">
        <mat-label>Поиск по ID</mat-label>
        <input matInput [(ngModel)]="searchId" placeholder="6b49c386...">
      </mat-form-field>

      <table mat-table [dataSource]="filteredCampaigns" multiTemplateDataRows>

        <ng-container matColumnDef="campaignId">
          <th mat-header-cell *matHeaderCellDef>ID рассылки</th>
          <td mat-cell *matCellDef="let c">{{ c.campaignId }}</td>
        </ng-container>

        <ng-container matColumnDef="totalSent">
          <th mat-header-cell *matHeaderCellDef>Отправлено</th>
          <td mat-cell *matCellDef="let c">{{ c.totalSent }}</td>
        </ng-container>

        <ng-container matColumnDef="totalOpened">
          <th mat-header-cell *matHeaderCellDef>Открыто</th>
          <td mat-cell *matCellDef="let c">{{ c.totalOpened }}</td>
        </ng-container>

        <ng-container matColumnDef="openRate">
          <th mat-header-cell *matHeaderCellDef>% открытий</th>
          <td mat-cell *matCellDef="let c">{{ openRate(c) }}</td>
        </ng-container>

        <ng-container matColumnDef="expand">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let c">
            <button mat-icon-button (click)="$event.stopPropagation(); toggleExpand(c.campaignId)">
              <mat-icon>{{ expandedCampaignId === c.campaignId ? 'expand_less' : 'expand_more' }}</mat-icon>
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="expandedDetail">
          <td mat-cell *matCellDef="let c" colspan="5">
            @if (expandedCampaignId === c.campaignId) {
              <app-campaign-details [campaignId]="c.campaignId"></app-campaign-details>
            }
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="toggleExpand(row.campaignId)" style="cursor: pointer"></tr>
        <tr mat-row *matRowDef="let row; columns: ['expandedDetail']" class="detail-row"></tr>

      </table>

    </mat-card-content>
  </mat-card>
}
