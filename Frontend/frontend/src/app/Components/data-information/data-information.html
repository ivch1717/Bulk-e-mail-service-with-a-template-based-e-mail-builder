<table mat-table [dataSource]="variables">
  <ng-container matColumnDef="variable">
    <th mat-header-cell *matHeaderCellDef>Шаблон</th>
    <td mat-cell *matCellDef="let v">{{ v }}</td>
  </ng-container>

  <ng-container matColumnDef="header">
    <th mat-header-cell *matHeaderCellDef>Таблица</th>
    <td mat-cell *matCellDef="let v">
      @if (mapping.size > 0) {
        <mat-form-field subscriptSizing="dynamic">
          <mat-select [ngModel]="mapping.get(v)" (ngModelChange)="onMappingChange(v, $event)">
            @for (h of headers; track h) {
              <mat-option [value]="h">{{ h }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
      }
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
